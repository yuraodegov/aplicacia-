name: build-apk

on:
  push:
  workflow_dispatch:

jobs:
  build:
    # 22.04 is the most compatible with the python-for-android toolchain.
    # ubuntu-latest (24.04) drops libtinfo5 and breaks older NDK tools.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.0" buildozer

      - name: Build APK (debug)
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
